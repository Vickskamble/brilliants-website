<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Payment Successful — IronBook</title>
<style>
  :root{--primary:#2563EB;--bg:#0F172A;--surface:#1E293B;--surface-2:#334155;--ink:#F8FAFC;--ink-soft:#94A3B8;--green:#10B981;--radius:12px}
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
  .card{background:var(--surface);border:1px solid #334155;border-radius:var(--radius);padding:40px 32px;max-width:440px;width:100%;text-align:center}
  .icon{width:64px;height:64px;background:rgba(16,185,129,.15);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:32px;color:var(--green)}
  h1{font-size:24px;margin-bottom:8px}
  p{color:var(--ink-soft);font-size:14px;line-height:1.6;margin-bottom:4px}
  .btn{display:inline-block;margin-top:24px;padding:12px 32px;border-radius:var(--radius);font-size:15px;font-weight:600;border:none;cursor:pointer;text-decoration:none}
  .btn-primary{background:var(--primary);color:#fff}
</style>
</head>
<body>
<div class="card">
  <div class="icon">&#10003;</div>
  <h1>Payment Successful!</h1>
  <p>Your IronBook subscription has been activated.</p>
  <p style="font-size:13px">Returning to the app...</p>
  <div style="margin-top:28px">
    <button class="btn btn-primary" onclick="window.close()">Return to IronBook</button>
  </div>
  <script>setTimeout(function(){ var c = window.close(); if(!c) document.querySelector('p[style]').textContent = 'Please switch back to the IronBook app.'; }, 3000);</script>
</div>
</body>
</html>
